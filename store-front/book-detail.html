<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=detail.html">
    <title>Redirecting</title>
</head>
<body>
    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (id) {
            window.location.replace(`detail.html?type=book&id=${id}`);
        } else {
            window.location.replace('index.html');
        }
    </script>
</body>
</html>
