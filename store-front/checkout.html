<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán | Gemini Bookstore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="container mx-auto px-6 py-12 max-w-4xl">
        <button onclick="window.location.href='index.html'" class="mb-6 text-indigo-600 hover:underline">
            <i class="fas fa-arrow-left"></i> Quay lại cửa hàng
        </button>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <h2 class="text-xl font-bold mb-4"><i class="fas fa-truck text-indigo-500 mr-2"></i> Phương thức vận chuyển</h2>
                    <select id="ship-method" class="w-full p-3 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="Standard">Giao hàng tiêu chuẩn (3-5 ngày)</option>
                        <option value="Express">Giao hàng hỏa tốc (24h)</option>
                        <option value="Grab">Giao qua Grab/Ahamove</option>
                    </select>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <h2 class="text-xl font-bold mb-4"><i class="fas fa-credit-card text-indigo-500 mr-2"></i> Phương thức thanh toán</h2>
                    <div class="space-y-3">
                        <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50">
                            <input type="radio" name="pay-method" value="COD" checked class="mr-3">
                            <span>Thanh toán khi nhận hàng (COD)</span>
                        </label>
                        <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50">
                            <input type="radio" name="pay-method" value="Banking" class="mr-3">
                            <span>Chuyển khoản ngân hàng</span>
                        </label>
                        <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50">
                            <input type="radio" name="pay-method" value="Momo" class="mr-3">
                            <span>Ví điện tử MoMo</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="bg-white p-8 rounded-2xl shadow-lg border border-indigo-100 flex flex-col justify-between">
                <div>
                    <h2 class="text-2xl font-bold mb-6">Tóm tắt đơn hàng</h2>
                    <div id="checkout-items" class="space-y-4 mb-6">
                        </div>
                </div>

                <div class="border-t pt-6">
                    <button id="btn-confirm" onclick="processOrder()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-indigo-700 transition transform hover:scale-[1.02]">
                        XÁC NHẬN THANH TOÁN
                    </button>
                    <p class="text-center text-gray-400 text-xs mt-4 uppercase tracking-widest"></p>
                </div>
            </div>
        </div>

        <div id="success-overlay" class="fixed inset-0 bg-white z-[200] hidden flex flex-col items-center justify-center text-center p-6">
            <div class="w-24 h-24 bg-green-100 text-green-500 rounded-full flex items-center justify-center text-5xl mb-6">
                <i class="fas fa-check"></i>
            </div>
            <h1 class="text-3xl font-bold mb-2">Đặt hàng thành công!</h1>
            <p class="text-gray-600 max-w-md mb-8">Đơn hàng của bạn đã được chuyển đến <b>Order Service</b>. Hệ thống đang kích hoạt <b>Pay Service</b> và <b>Ship Service</b>...</p>
            <div class="flex gap-4">
                <button onclick="window.location.href='index.html'" class="px-6 py-2 bg-gray-100 rounded-lg font-bold">Về trang chủ</button>
            </div>
        </div>
    </div>

    <script>
        const API = "http://localhost:8000/api";
        const userId = localStorage.getItem('userId');

        // Giả sử Dũng truyền danh sách ID sách cần mua qua URL (ví dụ: checkout.html?items=1,2)
        const urlParams = new URLSearchParams(window.location.search);
        const selectedItems = urlParams.get('items') ? urlParams.get('items').split(',') : [];

        async function loadCheckoutData() {
            if(!userId) return window.location.href = 'index.html';

            const res = await fetch(`${API}/carts/${userId}/`);
            const cart = await res.json();
            const container = document.getElementById('checkout-items');

            // Lọc ra những item người dùng đã tick từ trang cart
            const itemsToBuy = cart.items.filter(i => selectedItems.includes(i.book_id.toString()));

            if(itemsToBuy.length > 0) {
                // Gọi sang Book Service để lấy tên sách dựa trên ID
                const itemHtmls = await Promise.all(itemsToBuy.map(async (i) => {
                    try {
                        const bookRes = await fetch(`${API}/books/${i.book_id}/`);
                        const bookData = await bookRes.json();
                        return `
                            <div class="flex justify-between text-sm border-b pb-2">
                                <div>
                                    <p class="font-bold text-indigo-900">${bookData.title || 'Sách không tên'}</p>
                                    <p class="text-xs text-gray-500">Số lượng: ${i.quantity}</p>
                                </div>
                                <span class="font-bold text-indigo-600">${(bookData.price * i.quantity).toLocaleString()}đ</span>
                            </div>
                        `;
                    } catch (e) {
                        return `<div class="text-sm">Sách ID: ${i.book_id} (Không load được tên)</div>`;
                    }
                }));

                container.innerHTML = itemHtmls.join('');
            } else {
                container.innerHTML = "<p class='text-red-500 font-bold'>Vui lòng chọn sản phẩm từ giỏ hàng trước!</p>";
                document.getElementById('btn-confirm').disabled = true;
            }
        }

        async function processOrder() {
            const btn = document.getElementById('btn-confirm');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';
            btn.disabled = true;

            // Lấy danh sách ID sách đã tick từ URL (ví dụ: ?items=1,2,3)
            const urlParams = new URLSearchParams(window.location.search);
            const itemsRaw = urlParams.get('items');
            const selectedItems = itemsRaw ? itemsRaw.split(',').map(id => parseInt(id)) : [];

            const shipMethod = document.getElementById('ship-method').value;
            const payMethod = document.querySelector('input[name="pay-method"]:checked').value;

            try {
                const response = await fetch(`${API}/orders/`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        customer_id: parseInt(userId),
                        ship_method: shipMethod,
                        pay_method: payMethod,
                        selected_items: selectedItems // Gửi danh sách ID để Backend biết đường mà xóa
                    })
                });

                if(response.ok) {
                    // Hiện overlay thành công
                    document.getElementById('success-overlay').classList.remove('hidden');
                } else {
                    const errorData = await response.json();
                    alert("Lỗi: " + (errorData.error || "Không thể tạo đơn hàng"));
                    btn.innerHTML = 'XÁC NHẬN THANH TOÁN';
                    btn.disabled = false;
                }
            } catch (e) {
                console.error(e);
                alert("Lỗi kết nối Gateway!");
                btn.disabled = false;
            }
        }
        window.onload = loadCheckoutData;
    </script>
</body>
</html>
