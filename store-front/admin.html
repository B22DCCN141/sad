<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Bookstore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 text-gray-800">
    <nav class="bg-indigo-900 text-white p-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-2">
            <i class="fas fa-user-shield text-2xl"></i>
            <span class="text-xl font-bold">Quản Trị Hệ Thống</span>
        </div>
        <div class="flex items-center gap-4">
            <span id="admin-name" class="font-medium"></span>
            <button onclick="window.location.href='index.html'" class="text-sm bg-indigo-700 px-3 py-1 rounded hover:bg-indigo-600">Về trang chủ</button>
            <button onclick="logout()" class="text-red-400 hover:text-red-300"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-8">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold">Quản lý kho sách</h2>
            <button onclick="openBookModal()" class="bg-green-500 text-white px-6 py-2 rounded-lg shadow-lg hover:bg-green-600 flex items-center gap-2">
                <i class="fas fa-plus"></i> Thêm sách mới
            </button>
        </div>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden border">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="px-6 py-4 font-semibold text-gray-600">Thông tin sách</th>
                        <th class="px-6 py-4 font-semibold text-gray-600">Giá</th>
                        <th class="px-6 py-4 font-semibold text-gray-600">Kho</th>
                        <th class="px-6 py-4 text-center font-semibold text-gray-600">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="staff-table-body"></tbody>
            </table>
        </div>
    </main>

    <div id="book-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl p-8 relative">
            <h2 id="book-modal-title" class="text-xl font-bold mb-6">Thông tin sách</h2>
            <input type="hidden" id="edit-id">
            <div class="grid grid-cols-1 gap-4">
                <input type="text" id="book-title" placeholder="Tên sách" class="p-3 border rounded-lg">
                <input type="text" id="book-author" placeholder="Tác giả" class="p-3 border rounded-lg">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="book-price" placeholder="Giá" class="p-3 border rounded-lg">
                    <input type="number" id="book-stock" placeholder="Kho" class="p-3 border rounded-lg">
                </div>
                <button onclick="saveBook()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold">LƯU DỮ LIỆU</button>
                <button onclick="closeBookModal()" class="w-full text-gray-400 mt-2">Hủy</button>
            </div>
        </div>
    </div>

    <script>
        const API = "http://localhost:8000/api";

        window.onload = () => {
            const role = localStorage.getItem('userRole');
            if (role !== 'admin') {
                alert("Bạn không có quyền truy cập trang này!");
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('admin-name').innerText = localStorage.getItem('userName');
            loadStaffTable();
        };

        async function loadStaffTable() {
            try {
                const res = await fetch(`${API}/books/`);
                const books = await res.json();
                const tbody = document.getElementById('staff-table-body');

                tbody.innerHTML = books.map(b => `
                    <tr class="border-b hover:bg-gray-50 transition">
                        <td class="px-6 py-4 font-medium text-gray-500">#${b.id}</td>
                        <td class="px-6 py-4 font-bold text-gray-700">${b.title}</td>
                        <td class="px-6 py-4 text-indigo-600 font-semibold">${Number(b.price).toLocaleString()}đ</td>
                        <td class="px-6 py-4">
                            <span class="bg-blue-100 text-blue-700 px-2.5 py-1 rounded-full text-xs font-bold">
                                ${b.stock} quyển
                            </span>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="editBook(${b.id})" class="text-blue-600 hover:text-blue-800 font-medium mr-4">
                                <i class="fas fa-edit"></i> Sửa
                            </button>
                            <button onclick="deleteBook(${b.id})" class="text-red-500 hover:text-red-700 font-medium">
                                <i class="fas fa-trash"></i> Xóa
                            </button>
                        </td>
                    </tr>`).join('');
            } catch (e) {
                console.error("Không thể tải danh sách sách:", e);
            }
        }

        async function editBook(id) {
            try {
                // Gọi API lấy chi tiết cuốn sách để tránh undefined
                const res = await fetch(`${API}/books/${id}/`);
                const b = await res.json();

                if (b && b.id) {
                    // Đổ dữ liệu vào Modal
                    document.getElementById('edit-id').value = b.id;
                    document.getElementById('book-title').value = b.title;
                    document.getElementById('book-author').value = b.author;
                    document.getElementById('book-price').value = b.price;
                    document.getElementById('book-stock').value = b.stock;

                    // Đổi tiêu đề Modal và hiển thị
                    document.getElementById('book-modal-title').innerText = "Cập nhật thông tin sách";
                    document.getElementById('book-modal').classList.remove('hidden');
                } else {
                    alert("Không tìm thấy thông tin sách!");
                }
            } catch (e) {
                alert("Lỗi khi lấy thông tin sách từ Server!");
            }
        }

        function openBookModal() {
            document.getElementById('edit-id').value = "";
            document.getElementById('book-title').value = "";
            document.getElementById('book-author').value = "";
            document.getElementById('book-price').value = "";
            document.getElementById('book-stock').value = "";
            document.getElementById('book-modal').classList.remove('hidden');
        }

        async function saveBook() {
            const id = document.getElementById('edit-id').value;
            const data = {
                title: document.getElementById('book-title').value,
                author: document.getElementById('book-author').value,
                price: parseInt(document.getElementById('book-price').value),
                stock: parseInt(document.getElementById('book-stock').value)
            };

            if (!data.title || !data.price) return alert("Vui lòng nhập tên và giá sách!");

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API}/books/${id}/` : `${API}/books/`;

            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    alert(id ? "Cập nhật thành công!" : "Thêm sách mới thành công!");
                    closeBookModal();
                    loadStaffTable();
                } else {
                    alert("Lưu thất bại! Hãy kiểm tra dữ liệu đầu vào.");
                }
            } catch (e) {
                alert("Lỗi kết nối Gateway!");
            }
        }

        async function deleteBook(id) {
            if (confirm(`Bạn có chắc muốn xóa cuốn sách #${id}?`)) {
                try {
                    // Nhớ để dấu / ở cuối URL trong JS nếu Gateway của Dũng nối chuỗi chưa chuẩn
                    const res = await fetch(`${API}/books/${id}/`, {
                        method: 'DELETE',
                    });

                    // Kiểm tra status 204 hoặc 200/201
                    if (res.status === 204 || res.ok) {
                        alert("Đã xóa sách thành công!");
                        loadStaffTable(); // Tải lại bảng dữ liệu
                    } else {
                        alert("Xóa thất bại! Vui lòng kiểm tra log service.");
                    }
                } catch (e) {
                    alert("Lỗi kết nối Gateway!");
                }
            }
        }

        function closeBookModal() { document.getElementById('book-modal').classList.add('hidden'); }
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
