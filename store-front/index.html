<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstore | Microservices System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .book-card:hover { transform: translateY(-10px); transition: all 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        body { background-color: #f8fafc; }
    </style>
</head>
<body class="text-gray-800">

    <nav class="glass sticky top-0 z-50 border-b border-gray-200 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2 cursor-pointer" onclick="location.href='index.html'">
            <div class="bg-indigo-600 text-white p-2 rounded-lg"><i class="fas fa-book-open"></i></div>
            <span class="text-xl font-bold tracking-tight">Book<span class="text-indigo-600">Store</span></span>
        </div>

        <div class="flex items-center gap-6">
            <button onclick="location.href='index.html'" class="hover:text-indigo-600 font-medium">Trang chủ</button>
            <button id="nav-staff" onclick="window.location.href='admin.html'" class="hidden hover:text-indigo-600 font-medium text-red-600 italic">Quản trị (Staff)</button>

            <div id="cart-icon-wrapper" class="hidden relative cursor-pointer" onclick="window.location.href='cart.html'">
                <i class="fas fa-shopping-cart text-xl text-gray-600 hover:text-indigo-600"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">0</span>
            </div>

            <div id="auth-buttons" class="flex gap-3">
                <button onclick="openModal('login')" class="px-4 py-2 text-indigo-600 font-semibold border border-indigo-600 rounded-md hover:bg-indigo-50">Đăng nhập</button>
                <button onclick="openModal('register')" class="px-4 py-2 bg-indigo-600 text-white font-semibold rounded-md hover:bg-indigo-700">Đăng ký</button>
            </div>

            <div id="user-info" class="hidden flex items-center gap-4">
                <span class="font-medium text-gray-600">Chào, <span id="user-name-display" class="text-indigo-600 font-bold"></span></span>
                <button onclick="logout()" class="text-gray-400 hover:text-red-500"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-8">
        <section id="client-section">
            <div class="mb-12">
                <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                    <i class="fas fa-fire text-orange-500"></i> Gợi ý cho bạn
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="top-selling">
                    <p class="text-gray-400 italic">Đang tải sách gợi ý...</p>
                </div>
            </div>
            <div>
                <h2 class="text-2xl font-bold mb-6">Tất cả sản phẩm</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-8" id="all-books">
                    <p class="text-gray-400 italic">Đang tải danh sách sách...</p>
                </div>
            </div>
        </section>
    </main>

    <div id="auth-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl p-8 relative shadow-2xl">
            <h2 id="modal-title" class="text-2xl font-bold mb-6 text-center text-indigo-600">Đăng nhập</h2>
            <div class="space-y-4">
                <input type="text" id="auth-name" placeholder="Họ và tên" class="w-full p-3 border rounded-lg hidden">
                <input type="email" id="auth-email" placeholder="Email của bạn" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                <input type="password" id="auth-pass" placeholder="Mật khẩu" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                <input type="text" id="auth-phone" placeholder="Số điện thoại" class="w-full p-3 border rounded-lg hidden">
                <textarea id="auth-address" placeholder="Địa chỉ giao hàng" class="w-full p-3 border rounded-lg hidden"></textarea>

                <button id="auth-submit-btn" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">Xác nhận</button>
                <button onclick="closeModal()" class="w-full text-gray-400 text-sm hover:underline">Để sau</button>
            </div>
        </div>
    </div>

    <script>
        const API = "http://localhost:8000/api";

        // --- AUTH LOGIC ---
        async function handleLogin() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;

            try {
                // Kiểm tra Staff
                const resStaff = await fetch(`${API}/staff/`);
                const staffData = await resStaff.json();
                const admin = staffData.find(u => u.email === email && u.password === pass);
                if (admin) {
                    saveUser(admin.id, admin.name, 'admin');
                    window.location.href = 'admin.html';
                    return;
                }

                // Kiểm tra Customer
                const resCust = await fetch(`${API}/customers/`);
                const custData = await resCust.json();
                const user = custData.find(u => u.email === email && u.password === pass);
                if (user) {
                    saveUser(user.id, user.name, 'customer');
                    location.reload();
                    return;
                }
                alert("Email hoặc mật khẩu không chính xác!");
            } catch (e) { alert("Lỗi hệ thống hoặc Gateway chưa kết nối!"); }
        }

        function saveUser(id, name, role) {
            localStorage.setItem('userId', id);
            localStorage.setItem('userName', name);
            localStorage.setItem('userRole', role);
        }

        function logout() { localStorage.clear(); location.reload(); }

        function openModal(m) {
            document.getElementById('auth-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = m === 'login' ? 'Đăng nhập' : 'Đăng ký thành viên';
            const isReg = (m === 'register');
            document.getElementById('auth-name').classList.toggle('hidden', !isReg);
            document.getElementById('auth-phone').classList.toggle('hidden', !isReg);
            document.getElementById('auth-address').classList.toggle('hidden', !isReg);
            document.getElementById('auth-submit-btn').onclick = isReg ? handleRegister : handleLogin;
        }

        function closeModal() { document.getElementById('auth-modal').classList.add('hidden'); }

        // --- PRODUCT LOGIC ---
        async function loadBooks() {
            try {
                const res = await fetch(`${API}/books/`);
                const books = await res.json();

                // Top Selling (Gợi ý)
                document.getElementById('top-selling').innerHTML = books.slice(0, 3).map(b => `
                    <div class="bg-indigo-600 rounded-2xl p-6 text-white shadow-xl book-card flex justify-between items-center cursor-pointer"
                         onclick="window.location.href='book-detail.html?id=${b.id}'">
                        <div>
                            <h3 class="text-xl font-bold truncate w-40">${b.title}</h3>
                            <p class="opacity-70">${b.author}</p>
                            <p class="text-2xl font-bold mt-4">${Number(b.price).toLocaleString()}đ</p>
                        </div>
                        <i class="fas fa-star text-4xl opacity-30"></i>
                    </div>`).join('');

                // All Books
                document.getElementById('all-books').innerHTML = books.map(b => `
                    <div class="bg-white p-4 rounded-xl shadow-sm border book-card cursor-pointer"
                         onclick="window.location.href='book-detail.html?id=${b.id}'">
                        <div class="aspect-[3/4] bg-gray-50 rounded-lg mb-4 flex items-center justify-center text-gray-200 text-4xl">
                            <i class="fas fa-book"></i>
                        </div>
                        <h3 class="font-bold truncate text-gray-800">${b.title}</h3>
                        <div class="flex justify-between items-center mt-2" onclick="event.stopPropagation()">
                            <span class="text-indigo-600 font-bold">${Number(b.price).toLocaleString()}đ</span>
                            <button onclick="addToCart(${b.id})" class="text-gray-400 hover:text-indigo-600 text-xl transition">
                                <i class="fas fa-plus-circle"></i>
                            </button>
                        </div>
                    </div>`).join('');
            } catch(e) { console.error("Lỗi load sách:", e); }
        }

        // --- CART LOGIC ---
        async function addToCart(bookId) {
            const uid = localStorage.getItem('userId');
            if(!uid) return openModal('login');
            try {
                await fetch(`${API}/carts/`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({customer_id: parseInt(uid), book_id: parseInt(bookId), quantity: 1})
                });
                updateCartCount();
                alert("Đã thêm vào giỏ hàng!");
            } catch (e) { alert("Lỗi khi thêm vào giỏ hàng"); }
        }

        async function updateCartCount() {
            const uid = localStorage.getItem('userId');
            if(!uid) return;
            try {
                const res = await fetch(`${API}/carts/${uid}/`);
                const cart = await res.json();
                document.getElementById('cart-count').innerText = cart.items ? cart.items.length : 0;
            } catch (e) { console.error("Lỗi đếm giỏ hàng"); }
        }

        async function handleRegister() {
            const data = {
                name: document.getElementById('auth-name').value,
                email: document.getElementById('auth-email').value,
                password: document.getElementById('auth-pass').value,
                phone: document.getElementById('auth-phone').value,
                address: document.getElementById('auth-address').value
            };
            try {
                const res = await fetch(`${API}/customers/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) { alert("Đăng ký thành công! Hãy đăng nhập."); openModal('login'); }
            } catch (e) { alert("Lỗi khi đăng ký!"); }
        }

        // --- INITIALIZE ---
        window.onload = () => {
            loadBooks();
            const uid = localStorage.getItem('userId');
            if(uid) {
                document.getElementById('auth-buttons').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('cart-icon-wrapper').classList.remove('hidden');
                document.getElementById('user-name-display').innerText = localStorage.getItem('userName');
                if(localStorage.getItem('userRole') === 'admin') {
                    document.getElementById('nav-staff').classList.remove('hidden');
                }
                updateCartCount();
            }
        }
    </script>
</body>
</html>
