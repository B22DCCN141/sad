<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstore | Microservices System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        html {
            scroll-behavior: smooth;
        }

        * {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(79, 70, 229, 0.08), transparent 35%),
                radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.08), transparent 35%),
                linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
            min-height: 100vh;
        }

        .book-card {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .book-card:hover {
            transform: translateY(-8px);
        }

        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .surface {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
            transition: all 0.3s ease;
        }

        .surface:hover {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        }

        .hero-chip {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
        }

        .hero-chip:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>

<body class="text-gray-800">

    <nav class="glass sticky top-0 z-50 border-b border-gray-200 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2 cursor-pointer" onclick="location.href='index.html'">
            <div class="bg-indigo-600 text-white p-2 rounded-lg"><i class="fas fa-book-open"></i></div>
            <span class="text-xl font-bold tracking-tight">Book<span class="text-indigo-600">Store</span></span>
        </div>

        <div class="flex items-center gap-6">
            <button onclick="location.href='index.html'" class="hover:text-indigo-600 font-medium">Trang chủ</button>
            <button onclick="location.href='healthcare.html'"
                class="hover:text-indigo-600 font-medium text-red-600">Healthcare</button>
            <button id="nav-staff" onclick="window.location.href='admin.html'"
                class="hidden hover:text-indigo-600 font-medium text-red-600 italic">Quản trị (Staff)</button>

            <div id="cart-icon-wrapper" class="hidden relative cursor-pointer"
                onclick="window.location.href='cart.html'">
                <i class="fas fa-shopping-cart text-xl text-gray-600 hover:text-indigo-600"></i>
                <span id="cart-count"
                    class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">0</span>
            </div>

            <div id="auth-buttons" class="flex gap-3">
                <button onclick="openModal('login')"
                    class="px-4 py-2 text-indigo-600 font-semibold border border-indigo-600 rounded-md hover:bg-indigo-50">Đăng
                    nhập</button>
                <button onclick="openModal('register')"
                    class="px-4 py-2 bg-indigo-600 text-white font-semibold rounded-md hover:bg-indigo-700">Đăng
                    ký</button>
            </div>

            <div id="user-info" class="hidden flex items-center gap-4">
                <span class="font-medium text-gray-600">Chào, <span id="user-name-display"
                        class="text-indigo-600 font-bold"></span></span>
                <button onclick="logout()" class="text-gray-400 hover:text-red-500"><i
                        class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-8">

        <div class="mb-12">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                <i class="fas fa-fire text-orange-500"></i> Gợi ý cho bạn
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="top-selling">
                <p class="text-gray-400 italic">Đang tải sách gợi ý...</p>
            </div>
        </div>
        <div id="all-products">
            <h2 class="text-2xl font-bold mb-6">Tất cả sản phẩm</h2>
            <div class="flex flex-wrap gap-2 mb-6" id="product-tabs">
                <button class="tab-btn px-4 py-2 rounded-full text-sm font-semibold bg-indigo-600 text-white"
                    onclick="setFilter('all', this)">Tất cả</button>
                <button class="tab-btn px-4 py-2 rounded-full text-sm font-semibold bg-gray-100 text-gray-700"
                    onclick="setFilter('book', this)">Sách</button>
                <button class="tab-btn px-4 py-2 rounded-full text-sm font-semibold bg-gray-100 text-gray-700"
                    onclick="setFilter('electronic', this)">Điện tử</button>
                <button class="tab-btn px-4 py-2 rounded-full text-sm font-semibold bg-gray-100 text-gray-700"
                    onclick="setFilter('product', this)">Sản phẩm khác</button>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-8" id="all-books">
                <p class="text-gray-400 italic">Đang tải danh sách sách...</p>
            </div>
        </div>
    </main>

    <div id="auth-modal"
        class="fixed inset-0 bg-black bg-opacity-50 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl p-8 relative shadow-2xl">
            <h2 id="modal-title" class="text-2xl font-bold mb-6 text-center text-indigo-600">Đăng nhập</h2>
            <div class="space-y-4">
                <input type="text" id="auth-name" placeholder="Họ và tên" class="w-full p-3 border rounded-lg hidden">
                <input type="email" id="auth-email" placeholder="Email của bạn"
                    class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                <input type="password" id="auth-pass" placeholder="Mật khẩu"
                    class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                <input type="text" id="auth-phone" placeholder="Số điện thoại"
                    class="w-full p-3 border rounded-lg hidden">
                <textarea id="auth-address" placeholder="Địa chỉ giao hàng"
                    class="w-full p-3 border rounded-lg hidden"></textarea>

                <button id="auth-submit-btn"
                    class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">Xác
                    nhận</button>
                <button onclick="closeModal()" class="w-full text-gray-400 text-sm hover:underline">Để sau</button>
            </div>
        </div>
    </div>

    <script src="ai-ecommerce.js"></script>
    <script>
        const API = "http://localhost:8000/api";
        let catalogData = [];
        let currentFilter = 'all';
        let currentSearchQuery = '';
        let productCategoryMap = {};

        function slugify(input) {
            return String(input || '')
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '');
        }

        function placeholderImage(text) {
            return `https://placehold.co/600x800/f1f5f9/334155?text=${encodeURIComponent(text || 'Product')}`;
        }

        function resolveImage(item) {
            if (item.image_url && String(item.image_url).trim()) return item.image_url;
            return placeholderImage(item.name);
        }

        // --- AUTH LOGIC ---
        async function handleLogin() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;

            try {
                // Kiểm tra Staff
                const resStaff = await fetch(`${API}/staff/`);
                const staffData = await resStaff.json();
                const admin = staffData.find(u => u.email === email && u.password === pass);
                if (admin) {
                    saveUser(admin.id, admin.name, 'admin');
                    window.location.href = 'admin.html';
                    return;
                }

                // Kiểm tra Customer
                const resCust = await fetch(`${API}/customers/`);
                const custData = await resCust.json();
                const user = custData.find(u => u.email === email && u.password === pass);
                if (user) {
                    saveUser(user.id, user.name, 'customer');
                    location.reload();
                    return;
                }
                alert("Email hoặc mật khẩu không chính xác!");
            } catch (e) { alert("Lỗi hệ thống hoặc Gateway chưa kết nối!"); }
        }

        function saveUser(id, name, role) {
            localStorage.setItem('userId', id);
            localStorage.setItem('userName', name);
            localStorage.setItem('userRole', role);
        }

        function logout() { localStorage.clear(); location.reload(); }

        function openModal(m) {
            document.getElementById('auth-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = m === 'login' ? 'Đăng nhập' : 'Đăng ký thành viên';
            const isReg = (m === 'register');
            document.getElementById('auth-name').classList.toggle('hidden', !isReg);
            document.getElementById('auth-phone').classList.toggle('hidden', !isReg);
            document.getElementById('auth-address').classList.toggle('hidden', !isReg);
            document.getElementById('auth-submit-btn').onclick = isReg ? handleRegister : handleLogin;
        }

        function closeModal() { document.getElementById('auth-modal').classList.add('hidden'); }

        // --- PRODUCT LOGIC ---
        function renderTabs() {
            const tabs = [
                { key: 'all', label: 'Tất cả' },
                { key: 'book', label: 'Sách' },
                ...Object.entries(productCategoryMap)
                    .filter(([key, label]) => key !== 'sach' && String(label || '').toLowerCase() !== 'sach')
                    .map(([key, label]) => ({ key: `product-category:${key}`, label }))
            ];

            const html = tabs.map(t => {
                const active = currentFilter === t.key;
                const cls = active
                    ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/20 scale-105 transform'
                    : 'bg-white text-slate-600 hover:bg-slate-50 border border-slate-200/80 shadow-sm';
                return `<button class="tab-btn px-5 py-2.5 rounded-full text-xs uppercase tracking-wider font-bold transition-all duration-300 ${cls}" data-filter="${t.key}">${t.label}</button>`;
            }).join('');

            const tabsEl = document.getElementById('product-tabs');
            tabsEl.innerHTML = html;
            tabsEl.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => setFilter(btn.dataset.filter));
            });
        }

        function setFilter(filter) {
            currentFilter = filter;
            renderTabs();
            renderCatalog();
        }

        function filteredCatalog() {
            let filtered = catalogData;

            if (currentFilter !== 'all') {
                if (currentFilter.startsWith('product-category:')) {
                    const categoryKey = currentFilter.split(':')[1];
                    filtered = filtered.filter(item => item.type === 'product' && item.product_category_key === categoryKey);
                } else {
                    filtered = filtered.filter(item => item.type === currentFilter);
                }
            }

            if (currentSearchQuery.trim()) {
                const q = currentSearchQuery.trim().toLowerCase();
                filtered = filtered.filter(item =>
                    String(item.name || '').toLowerCase().includes(q) ||
                    String(item.subtitle || '').toLowerCase().includes(q) ||
                    String(item.typeLabel || '').toLowerCase().includes(q) ||
                    String(item.product_category_key || '').toLowerCase().includes(q)
                );
            }

            return filtered;
        }

        function applySearch(query) {
            currentSearchQuery = query || '';
            renderCatalog();
            if (window.BookstoreAI) {
                window.BookstoreAI.search(currentSearchQuery || 'hot products').catch(() => { });
            }
        }

        function renderCatalog() {
            const viewData = filteredCatalog();
            const gradients = {
                indigo: 'from-indigo-600 to-violet-850 shadow-indigo-500/20',
                emerald: 'from-emerald-600 to-teal-850 shadow-emerald-500/20',
                amber: 'from-amber-500 to-orange-700 shadow-amber-500/20'
            };

            document.getElementById('top-selling').innerHTML = viewData.slice(0, 3).map(item => {
                const gradientClass = gradients[item.color] || 'from-slate-700 to-slate-900 shadow-slate-500/20';
                return `
                <div class="bg-gradient-to-br ${gradientClass} rounded-[2rem] p-6 text-white shadow-xl book-card flex justify-between items-center relative overflow-hidden group ${item.detailUrl ? 'cursor-pointer' : ''}"
                     ${item.detailUrl ? `onclick="window.location.href='${item.detailUrl}'"` : ''}>
                    <!-- Decorative background glow -->
                    <div class="absolute -right-6 -bottom-6 w-32 h-32 bg-white/10 rounded-full blur-2xl group-hover:scale-150 transition-transform duration-500"></div>
                    
                    <div class="z-10 min-w-0 pr-4">
                        <div class="inline-block text-[10px] tracking-wider uppercase px-2.5 py-1 rounded-full bg-white/20 mb-3 font-extrabold backdrop-blur-md">${item.typeLabel}</div>
                        <h3 class="text-xl font-extrabold truncate w-40" title="${item.name}">${item.name}</h3>
                        <p class="text-sm opacity-80 truncate w-40 mt-1">${item.subtitle}</p>
                        <p class="text-2xl font-black mt-4 text-cyan-200">${item.price.toLocaleString()}đ</p>
                    </div>
                    <div class="w-24 h-24 rounded-2xl overflow-hidden bg-white/10 border border-white/20 shadow-inner shrink-0 z-10">
                        <img src="${resolveImage(item)}" alt="${item.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.onerror=null;this.src='${placeholderImage('No Image')}'">
                    </div>
                </div>`;
            }).join('') || '<p class="text-gray-400 italic col-span-3 text-center py-6">Không có sản phẩm trong mục này.</p>';

            document.getElementById('all-books').innerHTML = viewData.map(item => `
                <div class="group bg-white p-4 rounded-2xl shadow-sm border border-slate-100 book-card flex flex-col justify-between hover:shadow-lg ${item.detailUrl ? 'cursor-pointer' : ''}"
                     ${item.detailUrl ? `onclick="window.location.href='${item.detailUrl}'"` : ''}>
                    <div>
                        <div class="aspect-[3/4] bg-slate-50 rounded-xl mb-4 overflow-hidden relative border border-slate-100">
                            <img src="${resolveImage(item)}" alt="${item.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onerror="this.onerror=null;this.src='${placeholderImage('No Image')}'">
                        </div>
                        <div class="text-[10px] text-${item.color}-700 bg-${item.color}-50 inline-block px-2.5 py-1 rounded-full mb-3 font-bold uppercase tracking-wider">${item.typeLabel}</div>
                        <h3 class="font-extrabold text-slate-800 group-hover:text-indigo-600 transition-colors truncate text-sm" title="${item.name}">${item.name}</h3>
                        <p class="text-xs text-slate-400 truncate mt-1">${item.subtitle}</p>
                    </div>
                    <div class="flex justify-between items-center mt-4 pt-3 border-t border-slate-100" onclick="event.stopPropagation()">
                        <span class="text-indigo-600 font-extrabold text-base">${item.price.toLocaleString()}đ</span>
                        <button onclick="addToCart('${item.type}', ${item.id})" class="w-8 h-8 rounded-full bg-indigo-50 text-indigo-600 hover:bg-indigo-600 hover:text-white flex items-center justify-center transition-all duration-300 transform hover:scale-110 active:scale-95 shadow-sm" title="Thêm vào giỏ hàng">
                            <i class="fas fa-plus text-xs"></i>
                        </button>
                    </div>
                </div>`).join('') || '<p class="text-gray-400 italic col-span-5 text-center py-12">Không có sản phẩm trong mục này.</p>';
        }

        async function loadProducts() {
            try {
                const [bookRes, electronicRes, productRes] = await Promise.all([
                    fetch(`${API}/books/`),
                    fetch(`${API}/electronics/`),
                    fetch(`${API}/products/`)
                ]);

                const books = bookRes.ok ? await bookRes.json() : [];
                const electronicsRaw = electronicRes.ok ? await electronicRes.json() : { results: [] };
                const productsRaw = productRes.ok ? await productRes.json() : { results: [] };

                const electronics = Array.isArray(electronicsRaw) ? electronicsRaw : (electronicsRaw.results || []);
                const products = Array.isArray(productsRaw) ? productsRaw : (productsRaw.results || []);

                const normalizedBooks = books.map(b => ({
                    id: b.id,
                    name: b.title,
                    subtitle: b.author || 'Book Service',
                    price: Number(b.price) || 0,
                    image_url: b.image_url || null,
                    type: 'book',
                    typeLabel: 'Book',
                    icon: 'fa-book',
                    color: 'indigo',
                    detailUrl: `detail.html?type=book&id=${b.id}`
                }));

                const normalizedElectronics = electronics.filter(e => e.is_active !== false).map(e => ({
                    id: e.id,
                    name: e.name,
                    subtitle: e.brand || 'Electronic Service',
                    price: Number(e.price) || 0,
                    image_url: e.image_url || null,
                    type: 'electronic',
                    typeLabel: 'Electronic',
                    icon: 'fa-laptop',
                    color: 'emerald',
                    detailUrl: `detail.html?type=electronic&id=${e.id}`
                }));

                const normalizedProducts = products.filter(p => p.is_active !== false).map(p => ({
                    productCategoryName: p.category_name || 'Khac',
                    productCategoryKey: slugify(p.category_name || 'Khac'),
                    id: p.id,
                    name: p.name,
                    subtitle: p.category_name || p.brand_name || 'Product Service',
                    price: Number(p.price) || 0,
                    image_url: p.image_url || null,
                    type: 'product',
                    typeLabel: 'Product',
                    icon: 'fa-box-open',
                    color: 'amber',
                    detailUrl: `detail.html?type=product&id=${p.id}`,
                    product_category_key: slugify(p.category_name || 'Khac')
                }));

                productCategoryMap = {};
                normalizedProducts.forEach(p => {
                    productCategoryMap[p.productCategoryKey] = p.productCategoryName;
                });

                catalogData = [...normalizedBooks, ...normalizedElectronics, ...normalizedProducts]
                    .sort((a, b) => b.price - a.price);
                window.__BOOKSTORE_CATALOG__ = catalogData;
                window.__BOOKSTORE_CATALOG_LOOKUP__ = (productId) => catalogData.find(item => String(item.id) === String(productId));
                renderTabs();
                renderCatalog();
                applySearch(currentSearchQuery);
            } catch (e) {
                console.error("Lỗi load catalog:", e);
                document.getElementById('top-selling').innerHTML = '<p class="text-red-500 italic">Không tải được dữ liệu sản phẩm.</p>';
                document.getElementById('all-books').innerHTML = '<p class="text-red-500 italic">Không tải được dữ liệu sản phẩm.</p>';
            }
        }

        // --- CART LOGIC ---
        async function addToCart(productType, productId) {
            const uid = localStorage.getItem('userId');
            if (!uid) return openModal('login');
            try {
                await fetch(`${API}/carts/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        customer_id: parseInt(uid),
                        product_type: productType,
                        product_id: parseInt(productId),
                        quantity: 1
                    })
                });
                updateCartCount();
                alert("Đã thêm vào giỏ hàng!");
                if (window.BookstoreAI) {
                    window.BookstoreAI.cart({ user_id: Number(uid), product_ids: [Number(productId)], limit: 6 }).catch(() => { });
                }
            } catch (e) { alert("Lỗi khi thêm vào giỏ hàng"); }
        }

        async function updateCartCount() {
            const uid = localStorage.getItem('userId');
            if (!uid) return;
            try {
                const res = await fetch(`${API}/carts/${uid}/`);
                const cart = await res.json();
                const totalQty = cart.items ? cart.items.reduce((sum, it) => sum + Number(it.quantity || 0), 0) : 0;
                document.getElementById('cart-count').innerText = totalQty;
            } catch (e) { console.error("Lỗi đếm giỏ hàng"); }
        }

        async function handleRegister() {
            const data = {
                name: document.getElementById('auth-name').value,
                email: document.getElementById('auth-email').value,
                password: document.getElementById('auth-pass').value,
                phone: document.getElementById('auth-phone').value,
                address: document.getElementById('auth-address').value
            };
            try {
                const res = await fetch(`${API}/customers/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) { alert("Đăng ký thành công! Hãy đăng nhập."); openModal('login'); }
            } catch (e) { alert("Lỗi khi đăng ký!"); }
        }

        // --- INITIALIZE ---
        window.onload = () => {
            loadProducts();
            const uid = localStorage.getItem('userId');
            if (uid) {
                document.getElementById('auth-buttons').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('cart-icon-wrapper').classList.remove('hidden');
                document.getElementById('user-name-display').innerText = localStorage.getItem('userName');
                if (localStorage.getItem('userRole') === 'admin') {
                    document.getElementById('nav-staff').classList.remove('hidden');
                }
                updateCartCount();
            }

            const searchInput = document.getElementById('ai-search-input');
            const searchButton = document.getElementById('ai-search-button');
            if (searchInput && searchButton) {
                searchButton.addEventListener('click', () => applySearch(searchInput.value));
                searchInput.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter') applySearch(searchInput.value);
                });
            }
        }
    </script>
</body>

</html>
