<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstore | Microservices System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .book-card:hover { transform: translateY(-10px); transition: all 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .cart-sidebar { transition: transform 0.3s ease-in-out; }
        body { background-color: #f8fafc; }
    </style>
</head>
<body class="text-gray-800">

    <nav class="glass sticky top-0 z-50 border-b border-gray-200 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2 cursor-pointer" onclick="showSection('client')">
            <div class="bg-indigo-600 text-white p-2 rounded-lg"><i class="fas fa-book-open"></i></div>
            <span class="text-xl font-bold tracking-tight">Book<span class="text-indigo-600">Store</span></span>
        </div>

        <div class="flex items-center gap-6">
            <button onclick="showSection('client')" class="hover:text-indigo-600 font-medium">Trang chủ</button>
            <button onclick="showSection('staff')" class="hover:text-indigo-600 font-medium">Quản trị (Staff)</button>

            <div id="cart-icon-wrapper" class="hidden relative cursor-pointer" onclick="toggleCartModal()">
                <i class="fas fa-shopping-cart text-xl text-gray-600 hover:text-indigo-600"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">0</span>
            </div>

            <div id="auth-buttons" class="flex gap-3">
                <button onclick="openModal('login')" class="px-4 py-2 text-indigo-600 font-semibold border border-indigo-600 rounded-md hover:bg-indigo-50">Đăng nhập</button>
                <button onclick="openModal('register')" class="px-4 py-2 bg-indigo-600 text-white font-semibold rounded-md hover:bg-indigo-700">Đăng ký</button>
            </div>

            <div id="user-info" class="hidden flex items-center gap-4">
                <span class="font-medium text-gray-600">Chào, <span id="user-name-display" class="text-indigo-600 font-bold"></span></span>
                <button onclick="logout()" class="text-gray-400 hover:text-red-500"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-8">

        <section id="client-section">
            <div class="mb-12">
                <h2 class="text-2xl font-bold mb-6 flex items-center gap-2"><i class="fas fa-fire text-orange-500"></i> Top Mua Nhiều</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="top-selling"></div>
            </div>
            <div>
                <h2 class="text-2xl font-bold mb-6">Tất cả sản phẩm</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-8" id="all-books"></div>
            </div>
        </section>

        <section id="staff-section" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold">Quản lý kho sách</h2>
                <button onclick="openBookModal()" class="bg-green-500 text-white px-6 py-2 rounded-lg shadow-lg hover:bg-green-600 flex items-center gap-2">
                    <i class="fas fa-plus"></i> Thêm sách mới
                </button>
            </div>
            <div class="bg-white rounded-xl shadow-sm overflow-hidden border">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="px-6 py-4 font-semibold text-gray-600">Thông tin sách</th>
                            <th class="px-6 py-4 font-semibold text-gray-600">Giá</th>
                            <th class="px-6 py-4 font-semibold text-gray-600">Kho</th>
                            <th class="px-6 py-4 text-center font-semibold text-gray-600">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="staff-table-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="cart-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-[101] flex justify-end">
        <div class="bg-white w-full max-w-md h-full p-6 shadow-2xl overflow-y-auto">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <h2 class="text-2xl font-bold"><i class="fas fa-shopping-bag mr-2"></i> Giỏ hàng</h2>
                <button onclick="toggleCartModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <div id="cart-items-content" class="space-y-4"></div>
            <div class="mt-10 border-t pt-6">
                <button onclick="checkout()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-indigo hover:bg-indigo-700 transition">
                    XÁC NHẬN ĐẶT HÀNG
                </button>
            </div>
        </div>
    </div>

    <div id="auth-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl p-8 relative">
            <h2 id="modal-title" class="text-2xl font-bold mb-6 text-center text-indigo-600">Đăng nhập</h2>
            <div class="space-y-4">
                <input type="text" id="auth-name" placeholder="Họ và tên" class="w-full p-3 border rounded-lg hidden">
                <input type="email" id="auth-email" placeholder="Email của bạn" class="w-full p-3 border rounded-lg">
                <button id="auth-submit-btn" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold">Xác nhận</button>
                <button onclick="closeModal()" class="w-full text-gray-400 text-sm">Đóng</button>
            </div>
        </div>
    </div>

    <div id="book-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl p-8 relative">
            <h2 id="book-modal-title" class="text-xl font-bold mb-6">Thông tin sách</h2>
            <input type="hidden" id="edit-id">
            <div class="grid grid-cols-1 gap-4">
                <input type="text" id="book-title" placeholder="Tên sách" class="p-3 border rounded-lg">
                <input type="text" id="book-author" placeholder="Tác giả" class="p-3 border rounded-lg">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="book-price" placeholder="Giá" class="p-3 border rounded-lg">
                    <input type="number" id="book-stock" placeholder="Kho" class="p-3 border rounded-lg">
                </div>
                <button onclick="saveBook()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold">LƯU DỮ LIỆU</button>
                <button onclick="closeBookModal()" class="w-full text-gray-400">Hủy</button>
            </div>
        </div>
    </div>

    <script>
        const API = "http://localhost:8000/api";
        let mode = 'login';

        // --- UI CORE ---
        function showSection(name) {
            document.getElementById('client-section').classList.toggle('hidden', name !== 'client');
            document.getElementById('staff-section').classList.toggle('hidden', name !== 'staff');
            name === 'staff' ? loadStaffTable() : loadBooks();
        }

        function openModal(m) {
            mode = m;
            document.getElementById('auth-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = m === 'login' ? 'Đăng nhập' : 'Đăng ký thành viên';
            document.getElementById('auth-name').classList.toggle('hidden', m === 'login');
            document.getElementById('auth-submit-btn').onclick = m === 'login' ? handleLogin : handleRegister;
        }
        function closeModal() { document.getElementById('auth-modal').classList.add('hidden'); }
        function toggleCartModal() {
            document.getElementById('cart-modal').classList.toggle('hidden');
            loadCartDetail();
        }

        // --- BACKEND LOGIC ---

        // Load Books (Trang chủ)
        async function loadBooks() {
            const res = await fetch(`${API}/books/`);
            const books = await res.json();
            document.getElementById('top-selling').innerHTML = books.slice(0, 3).map(b => `
                <div class="bg-indigo-600 rounded-2xl p-6 text-white shadow-xl book-card flex justify-between items-center">
                    <div><h3 class="text-xl font-bold">${b.title}</h3><p class="opacity-70">${b.author}</p><p class="text-2xl font-bold mt-4">${Number(b.price).toLocaleString()}đ</p></div>
                    <i class="fas fa-medal text-5xl opacity-30"></i>
                </div>`).join('');

            // Tìm đoạn map render card sách và sửa onclick:
            document.getElementById('all-books').innerHTML = books.map(b => `
                <div class="bg-white p-4 rounded-xl shadow-sm border book-card cursor-pointer"
                     onclick="window.location.href='book-detail.html?id=${b.id}'">
                    <div class="aspect-[3/4] bg-gray-50 rounded-lg mb-4 flex items-center justify-center text-gray-200 text-4xl">
                        <i class="fas fa-book"></i>
                    </div>
                    <h3 class="font-bold truncate">${b.title}</h3>
                    <div class="flex justify-between items-center mt-2" onclick="event.stopPropagation()">
                        <span class="text-indigo-600 font-bold">${Number(b.price).toLocaleString()}đ</span>
                        <button onclick="addToCart(${b.id})" class="text-gray-400 hover:text-indigo-600 text-xl">
                            <i class="fas fa-plus-circle"></i>
                        </button>
                    </div>
                </div>`).join('');
        }

        // Staff CRUD (Sửa/Xóa)
        async function loadStaffTable() {
            const res = await fetch(`${API}/books/`);
            const books = await res.json();
            document.getElementById('staff-table-body').innerHTML = books.map(b => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="px-6 py-4 font-bold">${b.title}</td>
                    <td class="px-6 py-4 text-indigo-600">${Number(b.price).toLocaleString()}đ</td>
                    <td class="px-6 py-4"><span class="bg-gray-100 px-2 py-1 rounded">${b.stock}</span></td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="editBook(${b.id})" class="text-blue-500 mr-3"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteBook(${b.id})" class="text-red-500"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`).join('');
        }

        async function saveBook() {
            const id = document.getElementById('edit-id').value;
            const data = {
                title: document.getElementById('book-title').value,
                author: document.getElementById('book-author').value,
                price: document.getElementById('book-price').value,
                stock: document.getElementById('book-stock').value
            };
            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API}/books/${id}/` : `${API}/books/`;
            await fetch(url, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            closeBookModal(); loadStaffTable(); loadBooks();
        }

        async function deleteBook(id) {
            if(confirm('Xóa sách này?')) {
                await fetch(`${API}/books/${id}/`, { method: 'DELETE' });
                loadStaffTable(); loadBooks();
            }
        }

        // Cart & Auth
        async function updateCartCount() {
            const uid = localStorage.getItem('userId');
            if(!uid) return;
            const res = await fetch(`${API}/carts/${uid}/`);
            const cart = await res.json();
            document.getElementById('cart-count').innerText = cart.items ? cart.items.length : 0;
        }

        async function addToCart(bookId) {
            const uid = localStorage.getItem('userId');
            if(!uid) return openModal('login');
            await fetch(`${API}/carts/`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({customer_id: uid, book_id: bookId, quantity: 1})
            });
            updateCartCount();
            alert("Đã thêm vào giỏ!");
        }

        async function loadCartDetail() {
            const uid = localStorage.getItem('userId');
            const res = await fetch(`${API}/carts/${uid}/`);
            const cart = await res.json();
            document.getElementById('cart-items-content').innerHTML = cart.items && cart.items.length > 0 ?
                cart.items.map(i => `<div class="bg-gray-50 p-4 rounded-xl flex justify-between"><div><b>Sách ID: ${i.book_id}</b><p class="text-sm">Số lượng: ${i.quantity}</p></div><i class="fas fa-trash text-red-300"></i></div>`).join('') : '<p class="text-center text-gray-400">Giỏ hàng trống</p>';
        }

        // Tìm đến đoạn này trong <script> và sửa lại:
        async function checkout() {
            const uid = localStorage.getItem('userId');
            if (!uid) return alert("Vui lòng đăng nhập để thanh toán!");

            // Kiểm tra xem giỏ hàng có đồ không trước khi đi tiếp (Tùy chọn nhưng nên có)
            const res = await fetch(`${API}/carts/${uid}/`);
            const cart = await res.json();

            if (!cart.items || cart.items.length === 0) {
                return alert("Giỏ hàng của bạn đang trống!");
            }

            // Lệnh quan trọng nhất: Chuyển hướng sang file thanh toán riêng
            window.location.href = 'checkout.html';
        }

        async function handleRegister() {
            const name = document.getElementById('auth-name').value;
            const email = document.getElementById('auth-email').value;
            await fetch(`${API}/customers/`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name, email})});
            alert("Đăng ký xong! Hãy đăng nhập."); closeModal();
        }

        async function handleLogin() {
            const email = document.getElementById('auth-email').value;
            const res = await fetch(`${API}/customers/`);
            const users = await res.json();
            const user = users.find(u => u.email === email);
            if(user) {
                localStorage.setItem('userId', user.id);
                localStorage.setItem('userName', user.name);
                location.reload();
            } else alert("Sai email!");
        }

        function logout() { localStorage.clear(); location.reload(); }
        function openBookModal(id = null) { document.getElementById('book-modal').classList.remove('hidden'); document.getElementById('edit-id').value = ""; }
        async function editBook(id) {
            const res = await fetch(`${API}/books/${id}/`);
            const b = await res.json();
            document.getElementById('edit-id').value = b.id;
            document.getElementById('book-title').value = b.title;
            document.getElementById('book-author').value = b.author;
            document.getElementById('book-price').value = b.price;
            document.getElementById('book-stock').value = b.stock;
            document.getElementById('book-modal').classList.remove('hidden');
        }
        function closeBookModal() { document.getElementById('book-modal').classList.add('hidden'); }

        // Init
        loadBooks();
        if(localStorage.getItem('userId')) {
            document.getElementById('auth-buttons').classList.add('hidden');
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('cart-icon-wrapper').classList.remove('hidden');
            document.getElementById('user-name-display').innerText = localStorage.getItem('userName');
            updateCartCount();
        }
    </script>
</body>
</html>
